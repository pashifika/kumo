pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.go"
      run: make lint
    test:
      glob: "*.go"
      run: make test

pre-push:
  parallel: true
  commands:
    lint:
      glob: "*.go"
      run: make lint
    test:
      glob: "*.go"
      run: make test
    test-integration:
      glob: "*.go"
      run: make test-integration
